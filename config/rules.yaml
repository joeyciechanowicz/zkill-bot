mode: first-match

rules:
  - name: "high-value-kill"
    enabled: true
    priority: 10
    filter:
      zkb_value_min: 1000000000
    actions:
      - type: console
      # Uncomment and set url to send Discord notifications:
      # - type: webhook
      #   args:
      #     url: "https://discord.com/api/webhooks/..."
      #     template: "default"

  - name: "capital-kill"
    enabled: true
    priority: 20
    filter:
      has_capital: true
    actions:
      - type: console
      # - type: webhook
      #   args:
      #     url: "https://discord.com/api/webhooks/..."
      #     template: "capital"

  - name: "corp-loss"
    enabled: true
    priority: 30
    filter:
      victim_corporation_id: [98812444]
    actions:
      - type: console
      # - type: webhook
      #   args:
      #     url: "https://discord.com/api/webhooks/..."
      #     template: "loss"

  - name: "solo-pvp"
    enabled: true
    priority: 40
    filter:
      and:
        - solo: true
        - npc: false
    actions:
      - type: console

  - name: "all-kills"
    enabled: false
    priority: 100
    filter:
      npc: false
    actions:
      - type: console
