# zkill-bot configuration

debug: false

store:
  path: ./zkill-bot.db
  janitor_interval: 5m
  action_history_ttl: 168h   # 7d

retry:
  max_retries: 3
  base_backoff: 250ms
  max_backoff: 10s

pipelines:
  - name: zkill
    source:
      type: zkill
      base_url: https://r2z2.zkillboard.com
      sequence_path: /ephemeral/sequence.json
      poll_interval: 100ms
      backoff_404: 6s
    # Facts loaded before rule evaluation. Each lookup resolves key_path
    # against the event and places the result under event.facts.<alias>.
    facts:
      - scope: hostile
        key_path: victim.character_id
        alias: victim_hostile
    rules:
      mode: first-match
      rules:
        # Always-run writer: counts kills per attacker so later rules can
        # detect repeat offenders. `continue: true` keeps evaluation going
        # even after this rule matches.
        - name: record-attacker-kills
          enabled: true
          priority: 1
          continue: true
          when: "true"
          actions:
            - type: store
              for: attackers
              args:
                scope: "kill_by_char"
                key: '{{ .item.character_id }}'
                op: inc
                field: count
                by: 1
                ttl: 720h   # 30d rolling window

        - name: high-value-kill
          enabled: true
          priority: 10
          when: 'zkb.total_value > 1e9'
          actions:
            - type: console

        - name: capital-kill
          enabled: true
          priority: 20
          when: 'has_capital'
          actions:
            - type: console

        - name: repeat-offender
          enabled: true
          priority: 30
          when: |
            any(attackers, {
              let f = fact("kill_by_char", string(.character_id));
              f != nil && f.count >= 5
            }) && !zkb.npc
          actions:
            - type: console

        - name: jita-hub-kill
          enabled: true
          priority: 50
          when: |
            solar_system_name in ["Jita", "Amarr", "Dodixie", "Rens", "Hek"]
            && zkb.total_value > 5e8
            && !zkb.npc
          actions:
            - type: console
